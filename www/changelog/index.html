<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Changelog - Life Hub</title>
    <link rel="icon" href="/favicons/list-check.svg" type="image/svg+xml">
    
    <link rel="stylesheet" href="/output.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="manifest" href="/manifest.json" />


    <script>
        tailwind.config = {
            darkMode: 'class',
            safelist: [
                'bg-indigo-50/95', 'border-indigo-200', 'border-t-indigo-500', 
                'border-indigo-100', 'text-indigo-700', 'text-indigo-400', 
                'bg-indigo-100', 'ring-indigo-300'
            ]
        }
    </script>
    


    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: white;
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --border-color: #e5e7eb;
            --accent: #4f46e5;
            --radius: 1rem; 
        }
        .dark {
            --bg-color: #111827;
            --card-bg: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --border-color: #374151;
            --accent: #6366f1;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
            min-height: 100vh;
        }

        /* Form Elements overrides to match Hub */
        .hub-input {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            transition: all 0.2s;
        }
        .hub-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
            outline: none;
        }
    </style>
</head>
<body>

    <div id="main-app-container" class="container mx-auto px-4 pb-12 pt-4 max-w-3xl" style="display: none;">
        
        <div class="mb-6">
            <h1 class="text-3xl font-bold mb-2">Changelog</h1>
            <p class="text-[var(--text-secondary)] text-sm">Track new features, updates, and bug fixes across the ecosystem.</p>
        </div>

        <div class="mb-6 flex flex-col sm:flex-row gap-3">
            <div class="relative flex-grow">
                <i class="fa-solid fa-search absolute left-4 top-3.5 text-gray-400 text-sm"></i>
                <input type="text" id="search-input" placeholder="Search version or date..." 
                    class="hub-input w-full pl-10 pr-4 py-2.5 text-sm rounded-xl shadow-sm">
            </div>
            
            <div class="relative w-full sm:w-48">
                <select id="app-filter" class="hub-input w-full pl-4 pr-10 py-2.5 text-sm rounded-xl shadow-sm appearance-none cursor-pointer">
                    <option value="All Apps">All Apps</option>
                </select>
                <i class="fa-solid fa-chevron-down absolute right-4 top-3.5 text-gray-400 text-xs pointer-events-none"></i>
            </div>
        </div>

        <div id="changelog-container" class="space-y-4">
            </div>

        <div id="no-results" class="hidden text-center text-[var(--text-secondary)] py-12 bg-[var(--card-bg)] border border-[var(--border-color)] rounded-[var(--radius)]">
            <i class="fa-solid fa-box-open text-3xl mb-3 opacity-50"></i>
            <p>No changes found matching your filters.</p>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
        // Early theme apply to prevent flash
        try {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        } catch (e) {}
    </script>

    <script type="module">
        import { changelogData } from '/changelog-data.js';
        import { AppNavigation } from '/shared-nav.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { initializeAuth, browserLocalPersistence, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Mark highest version as seen immediately so hub red dot goes away
        if(changelogData && changelogData.length > 0) {
            localStorage.setItem('lastSeenVersion', changelogData[0].version);
        }

        const firebaseConfig = {
            apiKey: "AIzaSyBL_FesZhiD3JQH8ftmDgTS8HBdVPL1cj8",
            authDomain: "sammy-7298f.firebaseapp.com",
            projectId: "sammy-7298f",
            storageBucket: "sammy-7298f.appspot.com",
            messagingSenderId: "963185683535",
            appId: "1:963185683535:web:807df8941feba46c208e3a",
            measurementId: "G-JT1YF2ELN3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = initializeAuth(app, { persistence: browserLocalPersistence });
        const db = getFirestore(app);

        const nav = new AppNavigation({
            appName: 'Changelog',
            appIcon: 'fa-list-check',
            themeColor: 'indigo',
            userEmail: 'Guest',
            version: changelogData[0].version
        });

        // Show UI
        document.getElementById('main-app-container').style.display = 'block';

        onAuthStateChanged(auth, (user) => {
            if (user) nav.updateUser(user.email);
            else nav.updateUser('Guest');
        });

        // --- Data Parsing ---
        const parseChange = (change) => {
            const regex = /^(?:In (?:the )?)?([^:]+?):\s+(.*)/i;
            const match = change.match(regex);
            if (match && match[1] && match[2]) {
                let appName = match[1].trim();
                appName = appName.charAt(0).toUpperCase() + appName.slice(1);
                return { app: appName, text: match[2].trim() };
            }
            return { app: "General", text: change };
        };

        // --- Dropdown Init ---
        const populateAppDropdown = () => {
            const appSet = new Set();
            changelogData.forEach(entry => entry.changes.forEach(change => {
                appSet.add(parseChange(change).app);
            }));

            const sortedApps = Array.from(appSet).sort();
            const selectElement = document.getElementById('app-filter');

            sortedApps.forEach(appName => {
                if(appName === "General") return;
                const option = document.createElement('option');
                option.value = appName; option.textContent = appName;
                selectElement.appendChild(option);
            });
            if (appSet.has("General")) {
                const option = document.createElement('option');
                option.value = "General"; option.textContent = "General & Other";
                selectElement.appendChild(option);
            }
        };

        // --- Renderer ---
        const renderChangelog = (data, filterApp = 'All Apps') => {
            const container = document.getElementById('changelog-container');
            const noResults = document.getElementById('no-results');
            container.innerHTML = ''; 
            let visibleCount = 0;

            data.forEach((entry, index) => {
                const groups = {};
                let hasMatchingChanges = false;

                entry.changes.forEach(change => {
                    const parsed = parseChange(change);
                    if (filterApp !== 'All Apps' && parsed.app !== filterApp) return;
                    if (!groups[parsed.app]) groups[parsed.app] = [];
                    groups[parsed.app].push(parsed.text);
                    hasMatchingChanges = true;
                });

                if (!hasMatchingChanges) return;
                visibleCount++;

                const entryDiv = document.createElement('div');
                // Card styling to match ecosystem
                entryDiv.className = `bg-[var(--card-bg)] border border-[var(--border-color)] rounded-[var(--radius)] p-5 shadow-sm transition-all`;
                if(index === 0 && filterApp === 'All Apps' && !document.getElementById('search-input').value) {
                    entryDiv.classList.add('border-l-4', 'border-l-indigo-500'); // Highlight latest
                }

                // Header
                const dateObj = new Date(entry.date);
                const headerHtml = `
                    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center border-b border-[var(--border-color)] pb-3 mb-3">
                        <div class="flex items-center gap-2">
                            <h2 class="text-xl font-bold text-[var(--text-primary)]">${entry.version}</h2>
                            ${index === 0 && filterApp === 'All Apps' ? '<span class="bg-indigo-100 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400 text-[10px] uppercase font-bold px-2 py-0.5 rounded-full">Latest</span>' : ''}
                        </div>
                        <span class="text-xs font-medium text-[var(--text-secondary)] mt-1 sm:mt-0"><i class="fa-regular fa-calendar mr-1"></i> ${dateObj.toLocaleDateString('en-GB', { year: 'numeric', month: 'long', day: 'numeric' })}</span>
                    </div>
                `;
                entryDiv.insertAdjacentHTML('beforeend', headerHtml);

                // Body
                const sortedKeys = Object.keys(groups).sort((a, b) => a === 'General' ? 1 : b === 'General' ? -1 : a.localeCompare(b));

                sortedKeys.forEach(appName => {
                    const groupDiv = document.createElement('div');
                    groupDiv.className = 'mb-3 last:mb-0';
                    
                    const categoryHeader = document.createElement('h3');
                    categoryHeader.className = 'text-xs font-bold text-indigo-500 dark:text-indigo-400 uppercase tracking-wider mb-1.5 flex items-center gap-1.5';
                    categoryHeader.innerHTML = `<i class="fa-solid fa-caret-right opacity-50"></i> ${appName}`;
                    
                    const changesList = document.createElement('ul');
                    changesList.className = 'space-y-1.5 text-sm text-[var(--text-secondary)] pl-4 border-l-2 border-[var(--border-color)] ml-1';

                    groups[appName].forEach(text => {
                        const listItem = document.createElement('li');
                        listItem.className = 'leading-snug';
                        // Add some basic auto-bolding for nice formatting
                        let formattedText = text.replace(/(Added|Fixed|Updated|Changed|Removed)/i, '<strong class="text-[var(--text-primary)]">$1</strong>');
                        listItem.innerHTML = formattedText;
                        changesList.appendChild(listItem);
                    });

                    groupDiv.appendChild(categoryHeader);
                    groupDiv.appendChild(changesList);
                    entryDiv.appendChild(groupDiv);
                });

                container.appendChild(entryDiv);
            });

            noResults.classList.toggle('hidden', visibleCount > 0);
        };

        // --- Listeners ---
        const searchInput = document.getElementById('search-input');
        const appSelect = document.getElementById('app-filter');

        const applyFilters = () => {
            const query = searchInput.value.toLowerCase();
            const selectedApp = appSelect.value;
            const filteredData = changelogData.filter(entry => entry.version.toLowerCase().includes(query) || entry.date.includes(query));
            renderChangelog(filteredData, selectedApp);
        };
        
        searchInput.addEventListener('input', applyFilters);
        appSelect.addEventListener('change', applyFilters);

        // --- Go ---
        document.addEventListener('DOMContentLoaded', () => {
            populateAppDropdown();
            renderChangelog(changelogData);
        });
    </script>
</body>
</html>
