<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Profile - Lifeblogging Hub</title>
    <link rel="icon" href="/favicons/house.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: white;
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --border-color: #e5e7eb;
        }
        .dark {
            --bg-color: #111827;
            --card-bg: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --border-color: #374151;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
        }
        .dashboard-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 1.25rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="min-h-screen">

    <header class="bg-[var(--card-bg)] border-b border-[var(--border-color)] shadow-sm sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="/" class="flex items-center gap-2 font-bold text-indigo-600 dark:text-indigo-400">
                <i class="fa-solid fa-cube"></i> Lifeblogging
            </a>
            <button id="theme-toggle" class="w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-500 hover:text-indigo-500 transition-colors flex items-center justify-center">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </header>

    <div id="loading-container" class="flex flex-col items-center justify-center py-20">
        <i class="fas fa-spinner fa-spin text-4xl text-indigo-500 mb-4"></i>
        <p class="text-[var(--text-secondary)] font-medium">Loading profile...</p>
    </div>

    <div id="error-container" class="hidden max-w-md mx-auto mt-20 p-8 text-center bg-[var(--card-bg)] border border-[var(--border-color)] rounded-2xl shadow-sm">
        <i class="fas fa-lock text-5xl text-gray-400 mb-4"></i>
        <h2 id="error-title" class="text-2xl font-bold mb-2">Profile Private</h2>
        <p id="error-message" class="text-[var(--text-secondary)] mb-6">This user has chosen to keep their profile private, or the profile does not exist.</p>
        <a href="/" class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded-lg transition-colors">Return Home</a>
    </div>

    <div id="profile-container" class="hidden max-w-4xl mx-auto px-4 py-8">
        
        <div class="flex flex-col md:flex-row items-center md:items-start gap-6 mb-8 dashboard-card">
            <div id="profile-avatar" class="w-24 h-24 flex-shrink-0 rounded-full bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400 flex items-center justify-center text-4xl font-bold shadow-inner border border-indigo-200 dark:border-indigo-800">
                ?
            </div>
            <div class="flex-grow text-center md:text-left">
                <h1 id="profile-name" class="text-3xl font-bold mb-1">User Name</h1>
                <p class="text-[var(--text-secondary)] text-sm mb-3">
                    <i class="fas fa-calendar-alt mr-1"></i> <span id="profile-date">Member since unknown</span>
                </p>
                <div class="flex flex-wrap justify-center md:justify-start gap-2">
                    <span class="px-2.5 py-1 bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400 rounded-full text-xs font-bold border border-green-200 dark:border-green-800">
                        <i class="fas fa-check-circle mr-1"></i> Verified User
                    </span>
                </div>
            </div>
        </div>

        <h3 class="text-lg font-bold mb-4 px-1 border-b border-[var(--border-color)] pb-2">Public Collections</h3>
        
        <div class="space-y-8">
            <div id="section-plants" class="hidden">
                <h4 class="font-bold text-[var(--text-secondary)] uppercase tracking-wider text-xs mb-3 flex items-center gap-2"><i class="fas fa-leaf text-green-500"></i> Garden</h4>
                <div id="plants-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            </div>

            <div id="section-pets" class="hidden">
                <h4 class="font-bold text-[var(--text-secondary)] uppercase tracking-wider text-xs mb-3 flex items-center gap-2"><i class="fas fa-paw text-indigo-500"></i> Pets</h4>
                <div id="pets-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            </div>

            <div id="section-recipes" class="hidden">
                <h4 class="font-bold text-[var(--text-secondary)] uppercase tracking-wider text-xs mb-3 flex items-center gap-2"><i class="fas fa-book-open text-orange-500"></i> Recipes</h4>
                <div id="recipes-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            </div>
            
            <div id="no-collections-msg" class="hidden text-center p-8 text-[var(--text-secondary)] italic">
                This user hasn't added any items to their collections yet.
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBL_FesZhiD3JQH8ftmDgTS8HBdVPL1cj8",
            authDomain: "sammy-7298f.firebaseapp.com",
            projectId: "sammy-7298f",
            storageBucket: "sammy-7298f.firebasestorage.app",
            messagingSenderId: "963185683535",
            appId: "1:963185683535:web:807df8941feba46c208e3a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Theme Toggle
        const themeToggle = document.getElementById('theme-toggle');
        const applyTheme = (isDark) => {
            document.documentElement.classList.toggle('dark', isDark);
            themeToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        };
        const savedTheme = localStorage.getItem('theme') || 'light';
        applyTheme(savedTheme === 'dark');
        
        themeToggle.addEventListener('click', () => {
            const isDark = !document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            applyTheme(isDark);
        });

        // UI Elements
        const loadingContainer = document.getElementById('loading-container');
        const errorContainer = document.getElementById('error-container');
        const profileContainer = document.getElementById('profile-container');
        
        const showError = (title, msg) => {
            loadingContainer.classList.add('hidden');
            document.getElementById('error-title').textContent = title;
            document.getElementById('error-message').textContent = msg;
            errorContainer.classList.remove('hidden');
        };

        // Fetch User Data
        async function loadProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            const targetUid = urlParams.get('id');

            if (!targetUid) {
                return showError("No User Specified", "Please provide a valid user ID in the URL to view a profile.");
            }

            try {
                const profileRef = doc(db, 'users', targetUid, 'settings', 'profile');
                const profileSnap = await getDoc(profileRef);

                if (!profileSnap.exists()) {
                    return showError("Profile Not Found", "The user you are looking for does not exist.");
                }

                const data = profileSnap.data();

                // Respect Privacy Setting
                if (!data.isPublic) {
                    return showError("Profile Private", "This user has chosen to keep their profile private.");
                }

                // Populate UI
                const dName = data.displayName || 'Anonymous User';
                document.getElementById('profile-name').textContent = dName;
                
                const avatarEl = document.getElementById('profile-avatar');
                if (data.icon) {
                    avatarEl.innerHTML = `<i class="${data.icon}"></i>`;
                } else {
                    avatarEl.textContent = dName.charAt(0).toUpperCase();
                }
                
                // Show Content
                loadingContainer.classList.add('hidden');
                profileContainer.classList.remove('hidden');

                // Trigger data load, passing the profile data
                loadCollections(targetUid, data);

            } catch (error) {
                console.error("Error loading profile:", error);
                showError("Error", "Something went wrong while fetching this profile.");
            }
        }

        async function loadCollections(uid, profileData) {
            let hasData = false;
            
            // 1. Load Plants (Default to true if undefined)
            if (profileData.showPlants !== false) {
                const plantsSnap = await getDocs(collection(db, 'users', uid, 'plants'));
                if (!plantsSnap.empty) {
                    hasData = true;
                    document.getElementById('section-plants').classList.remove('hidden');
                    const grid = document.getElementById('plants-grid');
                    plantsSnap.forEach(doc => {
                        const p = doc.data();
                        grid.innerHTML += `
                            <div class="dashboard-card p-4 flex flex-col items-center text-center">
                                <i class="fas ${p.icon || 'fa-leaf'} text-3xl text-green-500 mb-2"></i>
                                <p class="font-bold text-sm w-full truncate" title="${p.name}">${p.name}</p>
                                <p class="text-[10px] text-[var(--text-secondary)] w-full truncate">${p.species || 'Unknown'}</p>
                            </div>`;
                    });
                }
            }

            // 2. Load Pets (Default to true if undefined)
            if (profileData.showPets !== false) {
                const petsSnap = await getDocs(collection(db, 'users', uid, 'pets'));
                if (!petsSnap.empty) {
                    hasData = true;
                    document.getElementById('section-pets').classList.remove('hidden');
                    const grid = document.getElementById('pets-grid');
                    petsSnap.forEach(doc => {
                        const p = doc.data();
                        grid.innerHTML += `
                            <div class="dashboard-card p-4 flex flex-col items-center text-center">
                                <i class="fas ${p.icon || 'fa-paw'} text-3xl text-indigo-500 mb-2"></i>
                                <p class="font-bold text-sm w-full truncate" title="${p.name}">${p.name}</p>
                                <p class="text-[10px] text-[var(--text-secondary)] w-full truncate">${p.breed || 'Pet'}</p>
                            </div>`;
                    });
                }
            }

            // 3. Load Recipes (Default to true if undefined)
            if (profileData.showRecipes !== false) {
                const recipesSnap = await getDocs(collection(db, 'users', uid, 'recipes'));
                if (!recipesSnap.empty) {
                    hasData = true;
                    document.getElementById('section-recipes').classList.remove('hidden');
                    const grid = document.getElementById('recipes-grid');
                    recipesSnap.forEach(doc => {
                        const r = doc.data();
                        const imgHtml = r.imageUrl 
                            ? `<img src="${r.imageUrl}" class="w-12 h-12 rounded-full object-cover mb-2 border-2 border-orange-100 dark:border-orange-900 flex-shrink-0">`
                            : `<i class="fas fa-utensils text-3xl text-orange-500 mb-2"></i>`;
                        
                        grid.innerHTML += `
                            <div class="dashboard-card p-4 flex flex-col items-center text-center">
                                ${imgHtml}
                                <p class="font-bold text-sm w-full truncate" title="${r.name}">${r.name}</p>
                                <p class="text-[10px] text-[var(--text-secondary)] w-full truncate">${r.prepTime ? r.prepTime + ' mins' : 'No time set'}</p>
                            </div>`;
                    });
                }
            }

            if (!hasData) {
                document.getElementById('no-collections-msg').classList.remove('hidden');
            }
        }

        // Initialize
        loadProfile();
    </script>
</body>
</html>
